<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WC 2026" />
<title>World Cup 2026 — Live Scores &amp; Schedule</title>
<link rel="manifest" href="site.webmanifest" />
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root{
    --bg:#0a0e1a; --card:rgba(255,255,255,.045); --card-brd:rgba(255,255,255,.09);
    --txt:#eef2ff; --muted:#93a0c0; --gold:#e9c46a; --gold2:#f4d489;
    --green:#2ec27e; --red:#ef5350; --accent:#6c8cff; --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--txt);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(108,140,255,.12), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(233,196,106,.08), transparent 55%),
      linear-gradient(180deg,#0a0e1a 0%, #0b1020 55%, #090d18 100%);
    min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:48px}
  .wrap{max-width:780px;margin:0 auto;padding:0 calc(14px + env(safe-area-inset-right)) 0 calc(14px + env(safe-area-inset-left))}

  header.hero{text-align:center;padding:calc(22px + env(safe-area-inset-top)) 14px 10px}
  .trophy{font-size:40px;line-height:1;filter:drop-shadow(0 4px 10px rgba(233,196,106,.45))}
  .brand-img{width:92px;height:92px;border-radius:22px;object-fit:cover;box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 0 1px var(--card-brd);display:inline-block}
  .hero h1{margin:8px 0 2px;font-size:25px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(90deg,#fff,var(--gold2) 60%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .sub{color:var(--muted);font-size:13px}
  .hosts{display:flex;gap:8px;justify-content:center;margin-top:9px;font-size:13px;color:var(--muted)}
  .hosts span{background:var(--card);border:1px solid var(--card-brd);padding:4px 10px;border-radius:999px}
  .apibar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:11px;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .apibar .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .apibar.err .live-dot{background:var(--red);box-shadow:0 0 8px var(--red)}
  .apibar .refresh{cursor:pointer;color:var(--gold);font-weight:700;background:none;border:1px solid var(--card-brd);padding:4px 9px;border-radius:999px}
  .tzrow{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px;font-size:12px;color:var(--muted)}
  .tzrow select{background:var(--card);color:var(--txt);border:1px solid var(--card-brd);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;outline:none;-webkit-appearance:none;appearance:none}
  .tzrow .abbr{color:var(--gold);font-weight:800;font-variant-numeric:tabular-nums}

  .sticky{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(10,14,26,.96),rgba(10,14,26,.86));
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--card-brd);padding:calc(8px + env(safe-area-inset-top)) 0 9px}
  .tabs{display:flex;gap:5px;justify-content:center;padding:0 10px}
  .tab{flex:1;text-align:center;padding:9px 4px;border-radius:11px;font-weight:700;font-size:12.5px;
    background:var(--card);border:1px solid var(--card-brd);color:var(--muted);cursor:pointer;transition:.18s}
  .tab.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241c05;border-color:transparent;box-shadow:0 6px 16px rgba(233,196,106,.25)}

  .segwrap{padding:11px 14px 0}
  .segmented{display:flex;background:var(--card);border:1px solid var(--card-brd);border-radius:13px;padding:4px;gap:4px}
  .seg{flex:1;text-align:center;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap}
  .seg.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(108,140,255,.3)}
  .seg .cnt{font-size:10px;opacity:.7;margin-left:2px}

  .toolbar{gap:8px;align-items:center;padding:10px 14px 2px;flex-wrap:wrap}
  .search{flex:1;min-width:150px;position:relative}
  .search input{width:100%;padding:10px 12px 10px 34px;border-radius:11px;border:1px solid var(--card-brd);background:var(--card);color:var(--txt);font-size:14px;outline:none}
  .search input::placeholder{color:#6b7795}
  .search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.6;font-size:13px}
  .pred-toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);background:var(--card);border:1px solid var(--card-brd);padding:8px 11px;border-radius:11px;cursor:pointer;user-select:none;white-space:nowrap}
  .pred-toggle .dot{width:30px;height:18px;border-radius:999px;background:#2a3350;position:relative;transition:.2s;flex:none}
  .pred-toggle .dot::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#9aa6c6;top:2px;left:2px;transition:.2s}
  .pred-toggle.on .dot{background:linear-gradient(135deg,var(--gold),var(--gold2))}
  .pred-toggle.on .dot::after{left:14px;background:#241c05}

  .chips{gap:7px;overflow-x:auto;padding:11px 14px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;background:var(--card);border:1px solid var(--card-brd);color:var(--muted);transition:.15s}
  .chip.active{background:var(--accent);color:#fff;border-color:transparent}

  .day{margin:18px 0 4px}
  .day-h{display:flex;align-items:center;gap:9px;margin:0 2px 9px;font-weight:800;font-size:14px}
  .day-h .line{flex:1;height:1px;background:linear-gradient(90deg,var(--card-brd),transparent)}
  .day-h .dnum{color:var(--gold);font-variant-numeric:tabular-nums}
  .day-h.today .badge{background:var(--green);color:#04210f;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px}

  .match{background:var(--card);border:1px solid var(--card-brd);border-radius:15px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer}
  .match::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent}
  .match.live::before{background:var(--red)}
  .match.next::before{background:var(--green)}
  .match.live{border-color:rgba(239,83,80,.4)}
  .match-top{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center}
  .teams{display:flex;flex-direction:column;gap:7px;min-width:0}
  .team{display:flex;align-items:center;gap:9px;font-size:15.5px;font-weight:600;min-width:0}
  .team .fl{font-size:21px;line-height:1;flex:none;width:26px;text-align:center}
  .team .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team.awin .nm{color:#fff;font-weight:800}
  .team.lose .nm{opacity:.55}
  .team .sc{margin-left:auto;font-size:19px;font-weight:900;font-variant-numeric:tabular-nums;color:#fff;flex:none}
  .team.lose .sc{opacity:.55}
  .team .pk{font-size:9px;font-weight:800;color:#241c05;background:linear-gradient(135deg,var(--gold),var(--gold2));padding:2px 6px;border-radius:6px;flex:none;display:none}
  body.show-pred .team.pick .pk{display:inline-block}
  .team .pk.ok{background:var(--green);color:#04210f}.team .pk.no{background:var(--red);color:#fff}
  .vs{font-size:10px;color:#5e6a88;font-weight:700;padding-left:35px;margin:-3px 0}
  .meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;flex:none;padding-left:6px}
  .meta .gp{font-size:10px;font-weight:800;color:var(--accent);background:rgba(108,140,255,.13);border:1px solid rgba(108,140,255,.3);padding:2px 7px;border-radius:7px}
  .meta .tm{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:#fff;white-space:nowrap}
  .meta .st{font-size:10px;font-weight:800;letter-spacing:.3px}
  .meta .st.ft{color:var(--muted)}.meta .st.live{color:var(--red)}
  .meta .vn{font-size:10px;color:var(--muted);max-width:120px;line-height:1.25}
  .goals{margin-top:10px;padding-top:9px;border-top:1px dashed rgba(255,255,255,.1);display:none;flex-direction:column;gap:4px}
  .match.open .goals{display:flex}
  .goal{display:flex;align-items:center;gap:7px;font-size:12px;color:#cfd7ee}
  .goal .mn{color:var(--gold);font-weight:800;font-variant-numeric:tabular-nums;min-width:32px}
  .goal.away{flex-direction:row-reverse;text-align:right}
  .goal .bl{font-size:11px}
  .goals .hint{font-size:11px;color:#6b7795;text-align:center}
  .tapnote{font-size:9.5px;color:#5e6a88;text-align:center;margin-top:7px}

  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px;line-height:1.6}

  /* views */
  .sched-wrap,.tables-wrap,.bracket-wrap,.pred-wrap{display:none}
  .v-sched .sched-wrap,.v-tables .tables-wrap,.v-bracket .bracket-wrap,.v-picks .pred-wrap{display:block}
  .segwrap,.toolbar,.chips{display:none}
  .v-sched .segwrap{display:block}.v-sched .toolbar{display:flex}.v-sched .chips{display:flex}

  /* tables */
  .chartcard{background:var(--card);border:1px solid var(--card-brd);border-radius:16px;padding:14px;margin:14px 0;box-shadow:var(--shadow)}
  .chartcard h2{margin:0 0 4px;font-size:15px}.chartcard .desc{color:var(--muted);font-size:12px;margin:0 0 10px}
  .chartbox{position:relative;height:340px}
  .gtable{background:var(--card);border:1px solid var(--card-brd);border-radius:14px;padding:11px 12px;margin-bottom:11px;box-shadow:var(--shadow)}
  .gtable h3{margin:0 0 8px;font-size:13px;color:var(--gold);display:flex;align-items:center;gap:7px}
  table.st{width:100%;border-collapse:collapse;font-size:12.5px}
  table.st th{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;text-align:center;padding:3px 2px}
  table.st td{padding:6px 2px;text-align:center;border-top:1px solid rgba(255,255,255,.05);font-variant-numeric:tabular-nums}
  table.st td.tn{text-align:left;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  table.st td.pts{font-weight:900;color:#fff}
  table.st tr.qual td{background:rgba(46,194,126,.07)}
  table.st tr.qual td.pos{color:var(--green);font-weight:800}
  table.st tr.third td.pos{color:var(--gold)}
  table.st .fl{font-size:14px;margin-right:4px}

  /* bracket */
  .ko-note{background:rgba(233,196,106,.08);border:1px solid rgba(233,196,106,.25);color:var(--gold2);border-radius:12px;padding:11px 13px;font-size:12.5px;margin:14px 0;line-height:1.5}
  .round{margin-top:14px}
  .round-h{font-weight:800;font-size:14px;margin:0 2px 9px;display:flex;align-items:center;gap:8px}
  .round-h .c{font-size:11px;color:var(--muted);font-weight:600}
  .ko{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--card-brd);border-radius:13px;padding:10px 13px;margin-bottom:8px;position:relative;border-left:3px solid rgba(108,140,255,.4)}
  .ko.final{border-left-color:var(--gold);background:rgba(233,196,106,.06)}
  .ko.live{border-left-color:var(--red)}
  .ko .pair{display:flex;flex-direction:column;gap:5px;min-width:0;flex:1}
  .ko .kt{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700}
  .ko .kt .fl{font-size:16px}
  .ko .kt .ks{margin-left:auto;font-weight:900;font-variant-numeric:tabular-nums}
  .ko .kt.win{color:#fff}.ko .kt.lose{opacity:.5}
  .ko .tbd{color:#5e6a88;font-weight:700;font-size:13px}
  .ko .info{text-align:right;padding-left:10px;flex:none}
  .ko .info .d{font-size:11.5px;font-weight:800;color:#fff}.ko .info .v{font-size:10px;color:var(--muted)}
  .ko .info .st{font-size:10px;font-weight:800;margin-top:2px}
  .ko .info .st.live{color:var(--red)}.ko .info .st.ft{color:var(--muted)}

  /* predictions */
  .pcard{background:var(--card);border:1px solid var(--card-brd);border-radius:16px;padding:16px;margin:14px 0;box-shadow:var(--shadow)}
  .pcard h2{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .pcard .desc{color:var(--muted);font-size:12.5px;margin:0 0 14px}
  .champ{text-align:center;padding:8px 0 2px}
  .champ .lbl{font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:800}
  .champ .big{font-size:30px;font-weight:900;margin:4px 0 0;display:flex;align-items:center;justify-content:center;gap:12px}
  .champ .big .fl{font-size:34px}
  .finalists,.extra{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.finalists{margin-top:14px}
  .fbox{background:rgba(255,255,255,.03);border:1px solid var(--card-brd);border-radius:12px;padding:11px;text-align:center}
  .fbox .t{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .fbox .v{font-size:15px;font-weight:800;margin-top:5px;display:flex;align-items:center;justify-content:center;gap:7px}
  .gpred{display:grid;grid-template-columns:auto 1fr 1fr;gap:8px 10px;align-items:center;font-size:13.5px}
  .gpred .gh{font-size:11px;font-weight:800;color:var(--accent)}
  .gpred .h1{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
  .gpred .w{font-weight:700}.gpred .w .fl,.gpred .r .fl{margin-right:5px}.gpred .r{color:var(--muted)}
  .gpred .row{display:contents}.gpred .row>div{padding:7px 0;border-top:1px solid rgba(255,255,255,.05)}

  footer{text-align:center;color:#5e6a88;font-size:11px;margin-top:26px;line-height:1.6;padding:0 14px}
  footer a{color:var(--muted)}
  .pulse{animation:pulse 1.4s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* language button (top-right of header) */
  header.hero{position:relative}
  .langbtn{position:absolute;top:calc(env(safe-area-inset-top) + 12px);right:14px;z-index:5;background:var(--card);color:var(--gold);border:1px solid var(--card-brd);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer}
  [dir="rtl"] .langbtn{right:auto;left:14px}
  /* favourite star (used in Tables) */
  .favbtn{background:none;border:none;color:#566083;font-size:15px;line-height:1;cursor:pointer;padding:0 5px 0 0}
  .favbtn.on{color:var(--gold)}
  .match.hasfav{border-color:rgba(233,196,106,.4)}
  .match-top{grid-template-columns:1fr auto auto}
  .cardacts{display:flex;flex-direction:column;gap:6px;justify-content:center;padding-left:10px;margin-left:2px;border-left:1px solid var(--card-brd)}
  .iconbtn{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid var(--card-brd);color:#aeb8d4;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
  .iconbtn:active{transform:scale(.92)}
  .meta .vn{max-width:108px}
  /* RTL */
  [dir="rtl"] .search .ic{left:auto;right:11px}
  [dir="rtl"] .search input{padding:10px 34px 10px 12px}
  [dir="rtl"] .team .favbtn{margin-left:0;margin-right:auto}
  [dir="rtl"] .team .sc{margin-left:0;margin-right:8px}
  [dir="rtl"] .vs{padding-left:0;padding-right:35px}
  [dir="rtl"] .meta{text-align:left}
  [dir="rtl"] .goal.away{flex-direction:row}
  [dir="rtl"] .goal.home{flex-direction:row-reverse}
  [dir="rtl"] .cardacts{border-left:none;border-right:1px solid var(--card-brd);padding-left:0;padding-right:10px;margin-left:0;margin-right:2px}
</style>
</head>
<body class="show-pred v-sched">
<header class="hero">
  <button class="langbtn" id="langBtn">Fa</button>
  <img class="brand-img" src="icon.png" alt="World Cup 2026" onerror="this.style.display='none';document.getElementById('brandFb').style.display='inline-block';" />
  <span class="trophy" id="brandFb" style="display:none">🏆</span>
  <h1>FIFA World Cup 2026</h1>
  <div class="sub" id="subLine"></div>
  <div class="hosts" id="hosts"></div>
  <div class="apibar" id="apibar"><span class="live-dot"></span><span id="apiStatus">…</span><button class="refresh" id="refreshBtn">↻</button></div>
  <div class="tzrow"><span id="tzLabel">🕒</span> <select id="tzSel"></select><span class="abbr" id="tzAbbr"></span></div>
</header>

<div class="sticky">
  <div class="tabs">
    <div class="tab active" data-view="sched"></div>
    <div class="tab" data-view="tables"></div>
    <div class="tab" data-view="bracket"></div>
    <div class="tab" data-view="picks"></div>
  </div>
</div>

<div class="wrap">
  <div class="segwrap">
    <div class="segmented" id="seg">
      <div class="seg active" data-f="next"><span class="lab"></span> <span class="cnt" id="cNext"></span></div>
      <div class="seg" data-f="past"><span class="lab"></span> <span class="cnt" id="cPast"></span></div>
      <div class="seg" data-f="all"><span class="lab"></span></div>
    </div>
  </div>
  <div class="toolbar">
    <div class="search"><span class="ic">🔍</span><input id="q" type="text" /></div>
  </div>
  <div class="chips" id="chips"></div>

  <div class="sched-wrap" id="sched"></div>
  <div class="tables-wrap" id="tablesView"></div>
  <div class="bracket-wrap" id="bracketView"></div>
  <div class="pred-wrap" id="predView"></div>

  <footer id="footer"></footer>
</div>

<script>
/* ============================================================
   CONFIG — set PROXY_URL to your Cloudflare Worker URL.
   Leave it as "" to run on the free TheSportsDB fallback.
   ============================================================ */
const PROXY_URL = "";                   // e.g. "https://wc2026.yourname.workers.dev"
const FD_COMP = "WC", FD_SEASON = 2026; // football-data.org: WC = FIFA World Cup
const TSD_KEY = "123", TSD_LEAGUE = "4429", TSD_SEASON = "2026"; // legacy fallback (free tier now limited)

// ===================== STATIC DATA =====================
const FLAG = {
  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿",
  "Canada":"🇨🇦","Bosnia & Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭",
  "Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Türkiye":"🇹🇷",
  "Germany":"🇩🇪","Curaçao":"🇨🇼","Côte d'Ivoire":"🇨🇮","Ecuador":"🇪🇨",
  "Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳",
  "Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿",
  "Spain":"🇪🇸","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾",
  "France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴",
  "Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴",
  "Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦"
};
const fl = n => FLAG[n] || "⚽";

// [date(PT), time24(PT), group, home, away, "Venue · City", predictedWinner]
const M = [
 ["2026-06-11","12:00","A","Mexico","South Africa","Mexico City Stadium · Mexico City","Mexico"],
 ["2026-06-11","19:00","A","South Korea","Czechia","Estadio Guadalajara · Guadalajara","South Korea"],
 ["2026-06-12","12:00","B","Canada","Bosnia & Herzegovina","Toronto Stadium · Toronto","Canada"],

function norm(s){
  s=(s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().replace(/[^a-z]/g,"");
  const alias={czechrepublic:"czechia",turkey:"turkiye",ivorycoast:"cotedivoire",
    congodr:"drcongo",democraticrepublicofcongo:"drcongo",rdcongo:"drcongo",
    korearepublic:"southkorea",republicofkorea:"southkorea",iriran:"iran",islamicrepublicofiran:"iran",
    caboverde:"capeverde",capeverdeislands:"capeverde",unitedstates:"usa",us:"usa",unitedstatesofamerica:"usa",
    bosniaandherzegovina:"bosniaherzegovina",bosnia:"bosniaherzegovina"};
  return alias[s]||s;
}
const pairKey=(a,b)=>[norm(a),norm(b)].sort().join("__");

// ===================== DATA LAYER =====================
let apiMap={};        // pairKey -> [ {home,away,hs,as,st,elapsed,ep,round,id} ]
let eventsMap={};     // fixtureId -> [ {team,player,minute,detail} ]

function mapStatus(short){
  short=(short||"").toUpperCase().trim();
  if(["FT","AET","PEN","MATCH FINISHED","FINISHED","AWARDED","WO"].includes(short)) return "FT";
  if(["1H","2H","HT","ET","BT","P","LIVE","INPLAY","SUSP","INT","FIRST HALF","SECOND HALF","HALF TIME","EXTRA TIME","BREAK TIME","PENALTY IN PROGRESS"].includes(short)) return "LIVE";
  if(/^\d/.test(short)) return "LIVE";
  return "NS";
}
function pushRec(map, r){ const k=pairKey(r.home,r.away); (map[k]=map[k]||[]).push(r); }
// fetch JSON with a hard timeout so a dead/slow feed never hangs the UI
async function fetchJSON(url){
  const c=new AbortController(); const t=setTimeout(()=>c.abort(),12000);
  try{ const r=await fetch(url,{cache:"no-store",signal:c.signal}); if(!r.ok) throw new Error("HTTP "+r.status); return await r.json(); }
  finally{ clearTimeout(t); }
}

function fdStatus(s){ s=(s||"").toUpperCase();
  if(s==="FINISHED") return "FT";
  if(s==="IN_PLAY"||s==="PAUSED"||s==="SUSPENDED") return "LIVE";
  return "NS"; }
function fdStage(s){ s=(s||"").toUpperCase();
  if(s==="LAST_32") return "Round of 32";
  if(s==="LAST_16") return "Round of 16";
  if(s==="QUARTER_FINALS"||s==="QUARTER_FINAL") return "Quarter-finals";
  if(s==="SEMI_FINALS"||s==="SEMI_FINAL") return "Semi-finals";
  if(s==="THIRD_PLACE"||s==="THIRD_PLACE_FINAL") return "Third place";
  if(s==="FINAL") return "Final";
  return "Group"; }

// turn a football-data /matches payload into apiMap; returns ids of live matches
function ingestFD(data){
  const arr=(data&&data.matches)||[];
  if(!arr.length) throw new Error("no matches in feed");
  const map={}, liveIds=[];
  arr.forEach(o=>{
    const ft=(o.score&&o.score.fullTime)||{};
    const st=fdStatus(o.status);
    const rec={
      home:o.homeTeam&&o.homeTeam.name, away:o.awayTeam&&o.awayTeam.name,
      hs:ft.home==null?null:+ft.home, as:ft.away==null?null:+ft.away,
      st, elapsed:o.minute||null,
      ep:Date.parse(o.utcDate), round:fdStage(o.stage), id:o.id
    };
    if(rec.home && rec.away){ pushRec(map,rec); if(st==="LIVE") liveIds.push(o.id); }
  });
  apiMap=map; apiLoaded=true;
  return liveIds;
}

// Path A: live proxy (Cloudflare / Val.town) — also fetches goal scorers
async function loadFD(){
  const base=PROXY_URL.replace(/\/$/,"");
  const data=await fetchJSON(`${base}/v4/competitions/${FD_COMP}/matches?season=${FD_SEASON}`);
  const liveIds=ingestFD(data); usingAF=true;
  await Promise.all(liveIds.slice(0,6).map(id=>loadEvents(id).catch(()=>{})));
  setApiStatus(true,"football-data.org");
  renderAll();
}

// Path B: GitHub Action writes scores.json into the repo; the page reads it same-origin (no proxy, no token)
async function loadLocal(){
  const data=await fetchJSON("scores.json?ts="+Math.floor(Date.now()/60000));
  ingestFD(data); usingAF=false;   // scorer details aren't included in this mode
  setApiStatus(true,"auto-updated");
  renderAll();
}

// goal scorers for one match (best-effort; may be limited on the free plan)
async function loadEvents(fixtureId){
  if(!usingAF || !PROXY_URL) return;
  const base=PROXY_URL.replace(/\/$/,"");
  const data=await fetchJSON(`${base}/v4/matches/${fixtureId}`);
  const goals=(data&&(data.goals||(data.match&&data.match.goals)))||[];
  eventsMap[fixtureId]=goals.map(g=>({
    team:g.team&&g.team.name, player:(g.scorer&&g.scorer.name)||"Goal",
    minute:g.minute||0, extra:g.injuryTime||0, detail:g.type||""
  })).sort((a,b)=>(a.minute+a.extra)-(b.minute+b.extra));
}

async function loadTSD(){
  const url=`https://www.thesportsdb.com/api/v1/json/${TSD_KEY}/eventsseason.php?id=${TSD_LEAGUE}&s=${TSD_SEASON}`;
  const data=await fetchJSON(url);
  const evs=(data&&data.events)||[];
  if(!evs.length) throw new Error("TheSportsDB free feed returned no data");
  const map={};
  evs.forEach(ev=>{
    pushRec(map,{
      home:ev.strHomeTeam, away:ev.strAwayTeam,
      hs:ev.intHomeScore==null?null:+ev.intHomeScore, as:ev.intAwayScore==null?null:+ev.intAwayScore,
      st:mapStatus(ev.strStatus), elapsed:null,
      ep:Date.parse((ev.strTimestamp||ev.dateEvent+"T12:00:00")+"Z"),
      round:ev.strLeague||"", id:ev.idEvent
    });
  });
  apiMap=map; usingAF=false; apiLoaded=true;
  setApiStatus(true,"TheSportsDB");
  renderAll();
}

async function loadScores(){
  try{
    if(PROXY_URL) await loadFD();              // live proxy if configured
    else { try{ await loadLocal(); }           // else the GitHub Action's scores.json
           catch(_){ await loadTSD(); } }       // last-ditch legacy fallback
  }catch(e){
    apiLoaded=true; setApiStatus(false,e.message); renderAll();
  }
}
let curSrc="";
function setApiStatus(ok,src){
  if(src!=null) curSrc=src;
  const bar=document.getElementById("apibar"), el=document.getElementById("apiStatus");
  bar.classList.toggle("err",!ok);
  if(ok){
    el.textContent=`${t('liveWord')} · ${curSrc} · ${timeInTZ(Date.now())} ${tzAbbr()}`;
  } else el.textContent = PROXY_URL ? t('scoresErr') : t('scoresSoon');
}

function lookupApi(m){
  const arr=apiMap[pairKey(m[3],m[4])];
  if(!arr||!arr.length) return null;
  const ep=ptEpoch(m[0],m[1]);
  let best=arr[0], bd=Math.abs(arr[0].ep-ep);
  for(const r of arr){const d=Math.abs(r.ep-ep);if(d<bd){bd=d;best=r;}}
  if(bd>3*24*3600*1000) return null;
  const same=norm(best.home)===norm(m[3]);
  return { hs:same?best.hs:best.as, as:same?best.as:best.hs, st:best.st, elapsed:best.elapsed, id:best.id, sameOrient:same };
}
const LIVE_WIN=130*60*1000;   // max plausible group-match wall-clock length (no-status fallback only)
function fixtureState(m, now){
  const a=lookupApi(m), ep=ptEpoch(m[0],m[1]);
  if(a){
    if(a.st==="LIVE" && now < ep+4*3600*1000) return {s:"live", a}; // trust live (guard against a stuck feed)
    if(a.st==="FT") return {s:"past", a};                           // finished per feed → never live
    if(a.hs!=null)  return {s:"past", a};                           // final score present even if status lagging
  }
  if(now < ep)            return {s:"upcoming", a:null};
  if(now < ep+LIVE_WIN)   return {s:"live", a:null};                 // best guess only while we have no status
  return {s:"past", a:null};
}

let goalsChart=null;
function computeStandings(){
  const g={}; const now=Date.now();
  M.forEach(m=>{const grp=m[2];g[grp]=g[grp]||{};[m[3],m[4]].forEach(t=>{g[grp][t]=g[grp][t]||{t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});});
  M.forEach(m=>{
    const a=fixtureState(m,now).a; if(!a||a.hs==null||a.as==null) return;
    const grp=m[2],H=g[grp][m[3]],A=g[grp][m[4]];
    H.p++;A.p++;H.gf+=a.hs;H.ga+=a.as;A.gf+=a.as;A.ga+=a.hs;
    if(a.hs>a.as){H.w++;A.l++;H.pts+=3;}
    else if(a.hs<a.as){A.w++;H.l++;A.pts+=3;}
    else{H.d++;A.d++;H.pts++;A.pts++;}
  });
  return g;
}
const cmpRow=(a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.t.localeCompare(b.t);

function roundKey(rd){
  rd=(rd||"").toLowerCase();
  if(rd.includes("round of 32")) return "Round of 32";
  if(rd.includes("round of 16")||rd.includes("8th")) return "Round of 16";
  if(rd.includes("quarter")) return "Quarter-finals";
  if(rd.includes("semi")) return "Semi-finals";
  if(rd.includes("3rd")||rd.includes("third")) return "Third place";
  if(rd.includes("final")) return "Final";
  return null;
}

    const file=new File([blob],"wc2026-match.png",{type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:"World Cup 2026"}).catch(()=>{});
    } else {
      const url=URL.createObjectURL(blob), a2=document.createElement("a");
      a2.href=url; a2.download=`${m[3]}-vs-${m[4]}.png`; document.body.appendChild(a2); a2.click(); a2.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    }
  },"image/png");
}

// ===================== APPLY LANGUAGE =====================
function applyI18n(){
  const root=document.documentElement;
  root.lang=lang; root.dir=lang==="fa"?"rtl":"ltr";
  document.querySelectorAll(".tab").forEach(el=>{ el.textContent=t("tab_"+el.dataset.view); });
  document.querySelectorAll("#seg .seg").forEach(el=>{ el.querySelector(".lab").textContent=t("seg_"+el.dataset.f); });
  document.getElementById("q").placeholder=t('search');
  document.getElementById("tzLabel").textContent=t('tzLabel');
  document.getElementById("subLine").textContent=t('sub');
  document.getElementById("hosts").innerHTML=`<span>🇨🇦 ${esc(teamName('Canada'))}</span><span>🇲🇽 ${esc(teamName('Mexico'))}</span><span>🇺🇸 ${esc(teamName('USA'))}</span>`;
  document.getElementById("footer").textContent=t('footer');
  document.getElementById("langBtn").textContent = lang==="fa" ? "En" : "Fa";
}

// ===================== EVENTS =====================
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>setView(t.dataset.view)));
document.getElementById("seg").addEventListener("click",e=>{
  const s=e.target.closest(".seg");if(!s)return;
  state.filter=s.dataset.f;
  document.querySelectorAll(".seg").forEach(x=>x.classList.toggle("active",x===s));
  renderSched();
});
document.getElementById("chips").addEventListener("click",e=>{
  const c=e.target.closest(".chip");if(!c)return;state.group=c.dataset.g;renderChips();renderSched();
});
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;renderSched();});
document.getElementById("refreshBtn").addEventListener("click",loadScores);
// favourite a team from the Tables tab
document.getElementById("tablesView").addEventListener("click",e=>{
  const b=e.target.closest(".favbtn"); if(b) toggleFav(b.dataset.team);
});
// timezone selector (default auto-detects the device timezone)
(function initTZ(){
  const sel=document.getElementById("tzSel");
  const opts=[["auto","Your time"],["America/Los_Angeles","Pacific"],["America/Denver","Mountain"],
    ["America/Chicago","Central"],["America/New_York","Eastern"],["America/Mexico_City","Mexico City"],
    ["America/Toronto","Toronto"],["Europe/London","UK"],["Europe/Paris","Central Europe"],
    ["Asia/Tehran","Tehran"],["Asia/Dubai","Dubai"],["Asia/Tokyo","Tokyo"],["UTC","UTC"]];
  sel.innerHTML=opts.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join("");
  sel.value=chosenTZ;
  document.getElementById("tzAbbr").textContent=tzAbbr();
  sel.addEventListener("change",()=>{
    chosenTZ=sel.value;
    try{localStorage.setItem("wc_tz",chosenTZ);}catch(e){}
    document.getElementById("tzAbbr").textContent=tzAbbr();
    renderAll(); if(state.view==="picks") renderPred();
    setApiStatus(apiLoaded);
  });
})();
// language toggle
document.getElementById("langBtn").addEventListener("click",()=>{
  lang = lang==="fa" ? "en" : "fa";
  try{ localStorage.setItem("wc_lang",lang); }catch(e){}
  applyI18n(); renderChips(); renderAll(); renderPred(); setApiStatus(apiLoaded);
});
// tap a match → favourite star / calendar / share / toggle scorers
document.getElementById("sched").addEventListener("click",async e=>{
  const act=e.target.closest(".iconbtn");
  if(act){ e.stopPropagation(); const ai=+act.dataset.i; act.dataset.act==="cal"?downloadICS(ai):shareCard(ai); return; }
  const card=e.target.closest(".match");if(!card)return;
  const i=+card.dataset.i, fid=card.dataset.fid;
  openCards[i]=!card.classList.contains("open");
  if(openCards[i] && fid && usingAF && eventsMap[fid]===undefined){
    try{ await loadEvents(fid); }catch(_){}
  }
  renderSched();
});

// adaptive polling: refresh often only when a match is live or about to start,
// otherwise back off to every 10 min — keeps a free API key well within quota.
let pollTimer=null;
function nextDelay(){
  const now=Date.now(); let live=false, soon=false;
  M.forEach(m=>{ const f=fixtureState(m,now); if(f.s==="live") live=true;
    const ep=ptEpoch(m[0],m[1]); if(ep>now && ep-now<30*60000) soon=true; });
  return (live||soon)?60000:600000;
}
function scheduleNext(){ clearTimeout(pollTimer); pollTimer=setTimeout(async()=>{ await loadScores(); scheduleNext(); }, nextDelay()); }

// init
applyI18n();
renderChips();renderSched();renderPred();
(async()=>{ await loadScores(); scheduleNext(); })();
setInterval(()=>{ if(state.view==="sched") renderSched(); },30000); // tick live/next labels
</script>
