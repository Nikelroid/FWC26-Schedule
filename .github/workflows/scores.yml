name: Update scores

# Pulls World Cup scores from football-data.org into scores.json, which the page reads directly.
# The token lives in the repo secret FD_TOKEN — never in the code or the page.
#
# Minimal usage by design:
#   • The schedule only wakes during match hours (UTC), in June & July.
#   • The script only calls the API when a match is live, just kicked off, awaiting a
#     final result, or starting within 15 min. Finished results are cached and never re-fetched.
#   • A commit (and Pages rebuild) happens only when scores.json actually changes.

on:
  # Derived from the real fixture list: kickoffs run 16:00–04:00 UTC and the latest
  # game ends ~07:00 UTC, so we cover 15:45 → 07:00 UTC at 10-min cadence and stay
  # completely idle the rest of the day. (PT = UTC−7; earliest KO 9:00 AM PT = 16:00 UTC.)
  schedule:
    - cron: "45 15 * 6,7 *"        # 15:45 UTC — 15 min before the earliest (9:00 AM PT) kickoffs
    - cron: "*/10 16-23 * 6,7 *"   # every 10 min, 16:00–23:59 UTC (afternoon & evening games)
    - cron: "*/10 0-6 * 6,7 *"     # every 10 min, 00:00–06:59 UTC (late games through the night)
    - cron: "0 7 * 6,7 *"          # 07:00 UTC — catch the final whistle of the latest (9:00 PM PT) games
  workflow_dispatch:
    inputs:
      force:
        description: "Force an API refresh even if no match is live"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update scores (calls API only when needed)
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: node scripts/update-scores.mjs

      - name: Commit if changed
        run: |
          git add scores.json
          # --cached so a brand-new (untracked) scores.json is detected too
          if git diff --cached --quiet; then
            echo "No score changes — no commit."
          else
            git config user.name "scores-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update scores [skip ci]"
            git push
          fi
